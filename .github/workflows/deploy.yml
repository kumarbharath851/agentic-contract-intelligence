name: CI/CD — Agentic Contract Intelligence

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT: "866543941893"
  ECR_REGISTRY: "866543941893.dkr.ecr.us-east-1.amazonaws.com"

permissions:
  id-token: write   # OIDC token for AWS
  contents: read

jobs:
  # ── 1. Build Angular frontend ─────────────────────────────
  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-impact-center
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-impact-center/package-lock.json
      - run: npm ci
      - run: npm run build -- --configuration production
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-impact-center/dist/

  # ── 2. Build Spring Boot services ────────────────────────
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - experience-gateway
          - contract-analyzer-service
          - mock-core-system
          - agent-tools-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - run: mvn -B verify --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar

  # ── 3. Package Lambda ─────────────────────────────────────
  build-lambda:
    name: Package Lambda Scanner
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda-contract-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: zip -r ../lambda-contract-scan.zip .
        working-directory: lambda-contract-scan
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: lambda-contract-scan.zip

  # ── 4. Push images to ECR & deploy ECS (main only) ───────
  deploy:
    name: Deploy to AWS
    needs: [build-frontend, build-services, build-lambda]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Download all service JARs
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-jar"
          path: artifacts/

      # Build and push each service image
      - name: Build & push service images
        run: |
          for SERVICE in auth-service experience-gateway contract-analyzer-service mock-core-system agent-tools-service; do
            cp artifacts/${SERVICE}-jar/*.jar ${SERVICE}/app.jar 2>/dev/null || true
            docker build -t $ECR_REGISTRY/aci-${SERVICE}:${{ github.sha }} ./${SERVICE}
            docker push $ECR_REGISTRY/aci-${SERVICE}:${{ github.sha }}
            docker tag $ECR_REGISTRY/aci-${SERVICE}:${{ github.sha }} $ECR_REGISTRY/aci-${SERVICE}:latest
            docker push $ECR_REGISTRY/aci-${SERVICE}:latest
          done

      # Update Lambda function code
      - name: Deploy Lambda scanner
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
      - name: Create or update Lambda scanner
        run: |
          ROLE_ARN="arn:aws:iam::${AWS_ACCOUNT}:role/aci-lambda-contract-scan-role"
          if aws lambda get-function --function-name aci-contract-scan --region $AWS_REGION >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name aci-contract-scan \
              --zip-file fileb://lambda-contract-scan.zip \
              --region $AWS_REGION
          else
            aws lambda create-function \
              --function-name aci-contract-scan \
              --runtime nodejs22.x \
              --handler index.handler \
              --zip-file fileb://lambda-contract-scan.zip \
              --role $ROLE_ARN \
              --timeout 30 \
              --memory-size 256 \
              --region $AWS_REGION
          fi

      - name: Configure Lambda environment
        run: |
          aws lambda update-function-configuration \
            --function-name aci-contract-scan \
            --region $AWS_REGION \
            --environment "Variables={ADMIN_API_URL=http://mock-core-system:8080/api/core/snapshots,EMAIL_TO=bharathkumarnoora@gmail.com,EMAIL_FROM=bharathkumarnoora@gmail.com,BASELINE_PATH=./baseline-policy-response.json,IMPACT_MAP_PATH=./code-impact-map.json}"

      - name: Configure EventBridge schedule
        run: |
          aws events put-rule \
            --name aci-agentcore-drift-scan \
            --schedule-expression "rate(5 minutes)" \
            --state ENABLED \
            --description "Run agentcore drift scan for life insurance policy API" \
            --region $AWS_REGION

          FUNCTION_ARN=$(aws lambda get-function --function-name aci-contract-scan --region $AWS_REGION --query 'Configuration.FunctionArn' --output text)

          aws events put-targets \
            --rule aci-agentcore-drift-scan \
            --region $AWS_REGION \
            --targets "Id"="aci-contract-scan-target","Arn"="$FUNCTION_ARN"

          aws lambda add-permission \
            --function-name aci-contract-scan \
            --statement-id aci-agentcore-drift-scan-invoke \
            --action lambda:InvokeFunction \
            --principal events.amazonaws.com \
            --source-arn "arn:aws:events:${AWS_REGION}:${AWS_ACCOUNT}:rule/aci-agentcore-drift-scan" \
            --region $AWS_REGION || true

      # Update ECS services (force new deployment)
      - name: Update ECS services
        run: |
          for SERVICE in auth experience-gateway contract-analyzer mock-core agent-tools; do
            aws ecs update-service \
              --cluster aci-cluster \
              --service aci-${SERVICE} \
              --force-new-deployment \
              --region $AWS_REGION 2>/dev/null || echo "ECS service aci-${SERVICE} not yet created — skipping"
          done
