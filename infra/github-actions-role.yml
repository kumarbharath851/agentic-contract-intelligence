AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM OIDC provider + deploy role for GitHub Actions
  (Agentic Contract Intelligence Platform)

Parameters:
  GitHubOrg:
    Type: String
    Default: kumarbharath851
  GitHubRepo:
    Type: String
    Default: agentic-contract-intelligence

Resources:
  # ── GitHub OIDC Identity Provider ─────────────────────────
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # ── IAM Role trusted by GitHub Actions ────────────────────
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeployRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
        - arn:aws:iam::aws:policy/AmazonECS_FullAccess
      Policies:
        - PolicyName: AciDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Lambda
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:GetFunction
                  - lambda:PublishVersion
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:aci-*"
              # CloudWatch Logs (ECS tasks write here)
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogDelivery
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/aci-*"
              # PassRole for ECS task execution
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/ecsTaskExecutionRole"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/ecsTaskRole"

Outputs:
  RoleArn:
    Description: ARN of the GitHub Actions deploy role
    Value: !GetAtt GitHubActionsDeployRole.Arn
    Export:
      Name: GitHubActionsDeployRoleArn
