services:
  frontend-impact-center:
    image: node:22-alpine
    working_dir: /workspace/frontend-impact-center
    volumes:
      - ./frontend-impact-center:/workspace/frontend-impact-center
    environment:
      - CI=true
      - NG_CLI_ANALYTICS=false
      - NPM_CONFIG_WORKSPACES=false
    command: sh -c "cd /workspace/frontend-impact-center && npm install --workspaces=false && npm run start -- --no-interactive"
    ports:
      - "4200:4200"
    depends_on:
      - auth-service
      - experience-gateway
      - contract-analyzer-service
      - mock-core-system
      - agent-tools-service

  auth-service:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace/auth-service
    volumes:
      - ./:/workspace
    command: sh -c "mvn spring-boot:run"
    ports:
      - "8081:8080"

  experience-gateway:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace/experience-gateway
    volumes:
      - ./:/workspace
    command: sh -c "mvn spring-boot:run"
    ports:
      - "8082:8080"

  contract-analyzer-service:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace/contract-analyzer-service
    volumes:
      - ./:/workspace
    command: sh -c "mvn spring-boot:run"
    ports:
      - "8083:8080"

  mock-core-system:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace/mock-core-system
    volumes:
      - ./:/workspace
    command: sh -c "mvn spring-boot:run"
    ports:
      - "8084:8080"

  agent-tools-service:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace/agent-tools-service
    volumes:
      - ./:/workspace
    command: sh -c "mvn spring-boot:run"
    ports:
      - "8085:8080"
